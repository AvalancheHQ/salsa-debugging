name: Install valgrind-codspeed
description: Build capstone + valgrind-codspeed (cycle-estimation) and install it, caching the compiled build tree.

inputs:
  capstone-version:
    description: capstone release tag to build against
    default: "5.0.9"
  valgrind-ref:
    description: valgrind-codspeed branch/tag to build
    default: "cod-3103-valgrind-atomics-have-incorrect-time-cause-hangs"

runs:
  using: composite
  steps:
    - name: Resolve valgrind-codspeed commit
      id: resolve
      shell: bash
      run: |
        sha=$(git ls-remote https://github.com/CodSpeedHQ/valgrind-codspeed "${{ inputs.valgrind-ref }}" | cut -f1)
        if [ -z "$sha" ]; then
          echo "Could not resolve ref '${{ inputs.valgrind-ref }}' in valgrind-codspeed" >&2
          exit 1
        fi
        echo "sha=$sha" >> "$GITHUB_OUTPUT"

    - name: Cache valgrind-codspeed build
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          capstone-install
          valgrind-codspeed
        key: valgrind-codspeed-${{ runner.os }}-${{ runner.arch }}-cs${{ inputs.capstone-version }}-vg${{ steps.resolve.outputs.sha }}-v1

    - name: Build capstone + valgrind-codspeed
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        export CS_VERSION="${{ inputs.capstone-version }}"
        export CAPSTONE_DIR="$PWD/capstone-install"
        git clone --depth 1 --branch "$CS_VERSION" \
          https://github.com/capstone-engine/capstone.git /tmp/capstone-src
        cmake -S /tmp/capstone-src -B /tmp/capstone-build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_FLAGS="-fno-stack-protector -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0" \
          -DCAPSTONE_ARCHITECTURE_DEFAULT=OFF \
          -DCAPSTONE_X86_SUPPORT=ON \
          -DCAPSTONE_ARM64_SUPPORT=ON \
          -DCAPSTONE_BUILD_SHARED_LIBS=OFF \
          -DCAPSTONE_BUILD_CSTOOL=OFF \
          -DCMAKE_INSTALL_LIBDIR=lib \
          -DCMAKE_INSTALL_PREFIX="$CAPSTONE_DIR"
        cmake --build /tmp/capstone-build -j"$(nproc)"
        cmake --install /tmp/capstone-build

        git clone https://github.com/CodSpeedHQ/valgrind-codspeed
        cd valgrind-codspeed
        git checkout "${{ steps.resolve.outputs.sha }}"
        ./autogen.sh && ./configure && make -j"$(nproc)"

    - name: Install valgrind-codspeed
      shell: bash
      run: |
        cd valgrind-codspeed
        sudo make install
